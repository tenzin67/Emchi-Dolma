<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tibetan geometric corner pattern matching flyer style -->
  <g fill="none" stroke="#1B5E7F" stroke-width="2">
    <!-- Outer frame -->
    <rect x="4" y="4" width="192" height="192" rx="4"/>
    
    <!-- Inner frame -->
    <rect x="12" y="12" width="176" height="176" rx="2"/>
    
    <!-- Corner decorations - top left -->
    <path d="M4,40 L4,4 L40,4" stroke="#F39C12" stroke-width="3"/>
    <rect x="20" y="20" width="20" height="20" rx="2" fill="#1B5E7F" opacity="0.15" stroke="#1B5E7F"/>
    <path d="M25,30 L30,22 L35,30 L30,38 Z" fill="#F39C12" opacity="0.6" stroke="none"/>
    
    <!-- Corner decorations - top right -->
    <path d="M196,40 L196,4 L160,4" stroke="#F39C12" stroke-width="3"/>
    <rect x="160" y="20" width="20" height="20" rx="2" fill="#1B5E7F" opacity="0.15" stroke="#1B5E7F"/>
    <path d="M165,30 L170,22 L175,30 L170,38 Z" fill="#F39C12" opacity="0.6" stroke="none"/>
    
    <!-- Corner decorations - bottom left -->
    <path d="M4,160 L4,196 L40,196" stroke="#F39C12" stroke-width="3"/>
    <rect x="20" y="160" width="20" height="20" rx="2" fill="#1B5E7F" opacity="0.15" stroke="#1B5E7F"/>
    <path d="M25,170 L30,162 L35,170 L30,178 Z" fill="#F39C12" opacity="0.6" stroke="none"/>
    
    <!-- Corner decorations - bottom right -->
    <path d="M196,160 L196,196 L160,196" stroke="#F39C12" stroke-width="3"/>
    <rect x="160" y="160" width="20" height="20" rx="2" fill="#1B5E7F" opacity="0.15" stroke="#1B5E7F"/>
    <path d="M165,170 L170,162 L175,170 L170,178 Z" fill="#F39C12" opacity="0.6" stroke="none"/>
    
    <!-- Center lotus -->
    <circle cx="100" cy="100" r="30" stroke="#1B5E7F" stroke-width="1.5" opacity="0.3"/>
    <circle cx="100" cy="100" r="18" stroke="#F39C12" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Lotus petals -->
    <path d="M100,70 Q108,80 100,90 Q92,80 100,70" fill="#1B5E7F" opacity="0.2"/>
    <path d="M100,110 Q108,120 100,130 Q92,120 100,110" fill="#1B5E7F" opacity="0.2"/>
    <path d="M70,100 Q80,108 90,100 Q80,92 70,100" fill="#1B5E7F" opacity="0.2"/>
    <path d="M110,100 Q120,108 130,100 Q120,92 110,100" fill="#1B5E7F" opacity="0.2"/>
    
    <!-- Diagonal petals -->
    <path d="M79,79 Q87,87 82,95 Q75,88 79,79" fill="#F39C12" opacity="0.2"/>
    <path d="M121,79 Q113,87 118,95 Q125,88 121,79" fill="#F39C12" opacity="0.2"/>
    <path d="M79,121 Q87,113 82,105 Q75,112 79,121" fill="#F39C12" opacity="0.2"/>
    <path d="M121,121 Q113,113 118,105 Q125,112 121,121" fill="#F39C12" opacity="0.2"/>
    
    <!-- Center dot -->
    <circle cx="100" cy="100" r="5" fill="#F39C12" opacity="0.7"/>
  </g>
</svg>
